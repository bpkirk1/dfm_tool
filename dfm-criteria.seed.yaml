      material_spec: EGS-207

  # ===========================================================================
  # NEW PROCESS FAMILY (mine.1, run 2026-06-19) — ENTIRE FAMILY status: proposed.
  # Source corpus: the p1255 "CNC Machining Suggestions" decks (SMTG, V1.0
  # 2025-12-15 / V2.0 2025-12-24) for the 4-pair & 16-pair backing-plate and
  # endcap (machined metal hardware, NOT stamped or molded). Kept in its own
  # family so no rule crosses into stamping/molding. Awaiting Brian's sign-off.
  # ===========================================================================
  cnc_machining:
    status: active                 # r1: family Brian-approved 2026-06-19 (all 6 rules active)
    applies_to_example: "p1255 4p/16p backing-plate & endcap (machined hardware)"

    rules:
      - id: CNC-TOOL-CLEARANCE-MIN
        parameter: machining_clearance_min_mm
        operator: gte
        limit: 0.8                     # tool-access clearance so a cutter can reach the pocket/root
        severity: major
        status: active                 # r1: Brian-approved 2026-06-19
        source: "p1255-16p & 4p backing-plate / endcap CNC Suggestions (SMTG, 2025-12-15/24): 'clearance 0.5-0.6mm too small, increase to 0.8mm and cancel root radius'"
        supplier_adjustable: true
        seen_count: 6
        evidence:
          - "p1255-16p-backing-plate V1/V2 Sht5: '0.5mm clearance -> increase to 0.8mm'"
          - "p1255-16p-endcap V1/V2 Sht10: 'Clearance 0.6mm -> over 0.8mm'"
          - "p1255-4p-backing-plate V1/V2 Sht5 & 4p-endcap V1/V2 Sht6: '0.5mm -> 0.8mm clearance'"
      - id: CNC-MIN-INTERNAL-RADIUS
        parameter: machining_internal_root_radius_min_mm
        operator: gte
        limit: 0.1                     # floor; open up to R1.0-R2.0 where space allows (tool-life)
        severity: minor
        status: active                 # r1: Brian-approved 2026-06-19
        source: "p1255 CNC Suggestions: tiny root radii enlarged (R0.5->R2.0, R0.25->R1.0); min root R0.1 to match post root"
        supplier_adjustable: true
        seen_count: 4
        evidence:
          - "p1255-16p-backing-plate V1/V2 Sht3: 'Radius R0.5 -> R2.0'"
          - "p1255-16p-endcap V1/V2 Sht8/Sht16: 'R0.25 -> R1.0' (TM: 'R1.0 will interfere with screw head/washer' — feature-dependent)"
          - "p1255-16p-endcap V2 Sht15 & 4p-endcap V2 Sht7: 'root radius R0.1 matching the root radius of the post'"
      - id: CNC-EDGE-CHAMFER-DEBURR
        parameter: machined_edge_chamfer
        operator: eq
        limit: "C0.1-C0.15 chamfer all around to avoid machining burrs; keep opening chamfers < C0.1 with a small flat"
        severity: minor
        status: active                 # r1: Brian-approved 2026-06-19
        source: "p1255-16p-endcap V1/V2 Sht13: 'Chamfer all around C0.1-C0.15 to avoid machining burrs'; 4p-backing-plate Sht4: 'reduce opening chamfer to < C0.1, leave small flat to avoid burr'"
        supplier_adjustable: false
        seen_count: 3
      - id: CNC-MIN-LEFTOVER-WALL
        parameter: machined_leftover_wall_min_mm
        operator: gte
        limit: 0.7                     # thin residual wall between machined features
        severity: minor
        status: active                 # r1: Brian-approved 2026-06-19
        source: "p1255-4p-backing-plate CNC Suggestions V1/V2 Sht6: 'leftover material at the position shown is less than 0.7 mm' (flagged as too thin)"
        supplier_adjustable: true
        seen_count: 1
      - id: CNC-BLIND-THREAD-RELIEF
        parameter: blind_threaded_hole_relief
        operator: eq
        limit: "add a relief groove at the bottom of a blind threaded hole (make it a through/relieved hole); ensure effective thread depth >= 2.85 mm"
        severity: minor
        status: active                 # r1: Brian-approved 2026-06-19
        source: "p1255-16p-endcap CNC Suggestions V1/V2 Sht6: blind threaded hole depth 7.9mm -> add relief groove, effective thread depth > 2.85 mm"
        supplier_adjustable: false
        seen_count: 1
      - id: CNC-TOLERANCE-CAPABILITY
        parameter: cnc_drawing_tolerance_capability
        operator: eq
        limit: "achievable CNC bands (SMTG): true-position ~0.10-0.15 (relaxed from tighter callouts, up to 0.25 on some), flatness/profile ~0.10-0.15, linear typ +/-0.06 to +/-0.10"
        severity: info
        status: active                 # r1: Brian-approved 2026-06-19
        source: "p1255 backing-plate/endcap CNC Suggestions V2.0 2025-12-24 (tolerance slides) with TM responses ('can relax to +/-0.10', 'positional relax to 0.15')"
        supplier_adjustable: true
        capability: {positional_typ: 0.15, flatness_typ: 0.10, linear_typ: 0.10, confirmed: false}
        seen_count: 4

    standards:
      part_general: EGPS-0201

# -----------------------------------------------------------------------------
# CTF (Critical-To-Function) dimension tracking
# Ballooned dims are CTF, measured in-process with SPC; SPC data accompanies
# every lot, and FAI feedback revises tolerances. The app tracks CTF dims with
# their achieved capability so criteria evolve from real production data.
# -----------------------------------------------------------------------------
ctf_tracking:
  enabled: true
  measured_in_process_spc: true
  spc_data_per_lot: true
  fields_per_ctf: [balloon_id, nominal, tol_plus, tol_minus, drawing_sheet, cpk_target, cpk_actual, sample_n, status]
  cpk_target_default: 1.33

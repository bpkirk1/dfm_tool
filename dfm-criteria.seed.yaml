        source: "DFM For 16X16-HSG-CONCEPT2-20251208 Sht20: '12x12 pins true position ~0.35mm by experience; recommend relax to 0.5mm for this product; one-sided deformation up to 0.25mm'"
        supplier_adjustable: true
        capability: {achieved_min: 0.35, relaxed_to: 0.5, cpk: null, confirmed: false}
        seen_count: 3
        evidence:
          - "16X16-HSG-CONCEPT2 2025-12-08 Sht20: 12x12 pin TP ~0.35mm experience, relax to 0.5mm"
          - "DFM2650336 SENTRY HD Housing 2026-06-01 Sht28: 'positional tolerance of holes about 0.5' (similar-product experience)"
          - "mine.2 PGCD-057: SentryHD Housing Rev.01 Sht28 — hole TP ~0.5 similar-product experience on CF-filled housings (strengthens relax-to-0.5)"
      - id: MOLD-TEXTURE-FINISH
        parameter: mold_surface_texture
        operator: eq
        limit: "VDI3400-9 on product/cavity surfaces; VDI3400-6 on hole/core positions (max)"
        severity: info
        status: active                 # r1: Brian-approved 2026-06-19
        source: "DFM-k1bnj6-gg-thk200 (2025-05) Sht13: 'finish follow VID3400/9 MAX'; HAORUN p1255-c15-ram-org 2025-12-01 Sht14: 'product surface VDI/9, hole positions VDI/6'"
        supplier_adjustable: true
        seen_count: 2

      # ======================================================================
      # mine.2 PROPOSED molding rules (run 2026-07-13) — Diff Pair components
      # corpus. Brian approved inclusion as PROPOSED via REVIEW_QUEUE.md.
      # MOLD-NO-ISLAND-VOLUMES and MOLD-NO-UNDERCUT-WALLS are TOOL-CHECKABLE
      # from geometry once a B-rep path exists (Phase 5).
      # ======================================================================
      - id: MOLD-NO-ISLAND-VOLUMES
        parameter: disconnected_plastic_volumes_per_shot
        operator: lte
        limit: 0                       # isolated plastic islands within one shot are unmoldable
        severity: blocker
        status: proposed
        source: "PGCD 757-8141 Rev.02 Sht23: isolated OM features cannot be molded — SD: modeling error, merge into IM"
        supplier_adjustable: false
        seen_count: 1
        evidence: ["mine.2 PGCD-031"]
      - id: MOLD-NO-UNDERCUT-WALLS
        parameter: min_wall_angle_vs_pull_deg
        operator: gte
        limit: 90                      # walls leaning negative to pull direction = undercut (88deg flipped to 92deg accepted)
        units: deg
        severity: major
        status: proposed
        source: "PGCD 757-8141 Rev.02 Sht18: wall angle 88 -> 92 deg to eliminate undercut — OK --SD20260706"
        supplier_adjustable: false
        seen_count: 1
        evidence: ["mine.2 PGCD-027"]
      - id: MOLD-EJECTOR-NOT-OPPOSITE-GATE
        parameter: ejector_gate_coaxiality
        operator: eq
        limit: "confirm: ejector pin must not directly face the gate — rapid pin/insert wear, ejector flash, high spare-part cost in multi-cavity high-speed molds"
        severity: minor
        status: proposed
        source: "AJET P0.2 concept-20260319 Sht5; AJET SentryHD RAM 20260511 Sht4"
        supplier_adjustable: false
        seen_count: 2
        evidence: ["mine.2 AJET-009", "mine.2 AJET-028"]
      - id: MOLD-TERMINAL-HOLDDOWN-DIA
        parameter: terminal_holddown_pin_dia_mm
        operator: gte
        limit: 0.25                    # quantifies MOLD-TERMINAL-FIXING: holddown pins dia >=0.25; witness marks accepted
        severity: minor
        status: proposed
        source: "AJET SentryHD RAM 20260511 Sht8 + 20260513 Sht12: 'add dia 0.25 holddown pins'"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 3
        evidence: ["mine.2 AJET-032", "mine.2 AJET-010", "mine.2 AJET-011"]
      - id: MOLD-EDM-FLAT-LAND
        parameter: min_edm_flat_land_mm
        operator: gte
        limit: 0.10                    # DERIVED: 0.08mm land flagged too short for insert EDM/split; 0.14mm acceptable
        severity: minor
        status: proposed
        source: "PGCD DFM2650336 SentryHD Housing Rev.01 Sht11 (chamfer 0.08x0.08 -> 0.08x0.05 to lengthen flat) + Sht9"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 2
        evidence: ["mine.2 PGCD-053", "mine.2 PGCD-051"]
      - id: MOLD-WELDLINE-HOLE-RADIUS
        parameter: weld_line_hole_edge_radius_mm
        operator: gte
        limit: 0.10                    # add R0.10 at hole edges where weld lines land (CF-filled resins break there)
        severity: minor
        status: proposed
        source: "PGCD DFM2650336 SentryHD Housing Rev.01 Sht8: weld line at hole edge breaks easily, add R0.10 TYP"
        supplier_adjustable: false
        seen_count: 1
        evidence: ["mine.2 PGCD-050"]
      - id: MOLD-SLOT-WIDTH-MIN
        parameter: molded_slot_width_min_mm
        operator: gte
        limit: 0.10                    # 0.05 wide x 0.05 deep slot too small; keep >= 0.1 (and >= slot depth)
        severity: minor
        status: proposed
        source: "AJET P0.2 concept 260312 Sht2: 'IM slot width 0.05 too small for depth 0.05; keep MIN 0.1mm'"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 1
        evidence: ["mine.2 AJET-001"]
      - id: MOLD-GATE-VESTIGE-SURFACE
        parameter: gate_vestige_placement
        operator: eq
        limit: "confirm: no gate vestige above functional surfaces — use a recessed gate pad (precedent 1.5 x 0.2 DP) or post-mold vestige pressing AFTER the final molding shot (never inside a stamping die: contamination risk)"
        severity: minor
        status: proposed
        source: "SD constraint PGCD 757-8141 Rev.02 Sht28; PGCD Housing Rev.01 Sht15-18; AJET SentryHD 0513 Sht4 (vestige pressing sequencing, compromised)"
        supplier_adjustable: false
        seen_count: 4
        evidence: ["mine.2 PGCD-033", "mine.2 PGCD-055", "mine.2 AJET-029", "mine.2 AJET-024"]
      - id: MOLD-SIBLING-CONSISTENCY
        parameter: family_variant_feature_consistency
        operator: eq
        limit: "confirm: features at equivalent positions must be consistent across part-family variants (-02V/-03V/-04V) unless intentionally different — supplier cross-check caught modeling errors twice"
        severity: info
        status: proposed
        source: "PGCD 757-8141 Rev.02 Sht19 (missing chamfer = modeling error) + Sht23 (island volume = modeling error)"
        supplier_adjustable: false
        seen_count: 2
        evidence: ["mine.2 PGCD-028", "mine.2 PGCD-031"]

    material_capability:           # molding resin reference (LCP Kingfa Vicryst R8332 / 807-0000-135)
      status: active               # r1: Brian-approved 2026-06-19
      resin: "LCP Kingfa Vicryst R8332 (807-0000-135)"
      max_melt_temp_C: 375
      linear_shrink_pct_typ: 0.6   # moldflow, both 4pr & 16pr organizers
      source: "p1255 16x16 Org-MDX-DFM-V1 Sht2; 11192025 Moldflow avg linear shrink warp prediction (org) Sht6/Sht17"

    standards:

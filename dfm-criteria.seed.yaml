# =============================================================================
# DFM CRITERIA — SEED CONFIG
# =============================================================================
# This file is the single source of truth for DFM rules. The application MUST
# load rules from here (and sibling files), never hardcode limits. Engineers
# and suppliers edit this file (or the UI that writes it) to tune criteria as
# capability feedback arrives. Every rule is versioned and auditable.
#
# Values below are seeded from two real Amphenol TCS drawings:
#   - Stamping: P-233-1111-500  (Signal Leadframe, multi-up, top, 1-4 pair)
#   - Molding : P-229-1551-500  (Center Plastic, multi-up, 1-4 pair)
#
# operator: lt | lte | gt | gte | eq | between | angle_tol
# severity: blocker | major | minor | info
# supplier_adjustable: true if a supplier may revise this from capability data
# =============================================================================

meta:
  schema_version: "1.0"
  ruleset_version: "2026.07.13-r2"
  units: mm                      # angles in degrees, Ra in micro-inch where noted
  last_edited_by: cowork-dfm-agent
  # Scoring constants for the deterministic evaluator. Config-driven (never
  # hardcoded): marginal_fraction sets the pass->flag band; severity_weight and
  # verdict_credit drive the 0-100 readiness score. Omit this block to use the
  # historical defaults shown below.
  scoring:
    marginal_fraction: 0.10
    severity_weight: {blocker: 10.0, major: 5.0, minor: 2.0, info: 0.5}
    verdict_credit: {pass: 1.0, flag: 0.5, fail: 0.0}
  # Correction advisor: safety margin nudges a compliant target just past the
  # limit so a fixed value clears the marginal (flag) band. Keep aligned with
  # scoring.marginal_fraction.
  corrections:
    safety_margin: 0.10
  # r1 (2026-06-19): Brian approved 14 of the mine.1 items (incl. tightening
  # MOLD-MIN-WALL-FILL 0.15->0.20 and loosening MOLD-MIN-CORNER-RADIUS 0.15->0.10)
  # and the whole cnc_machining family; 5 single-source items remain proposed.
  # r2 / mine.2 (2026-07-13): second mining pass over the "Diff Pair components"
  # supplier corpus (Hoky 3 decks, AJET 11 decks + 1 eml, Polygon 25 decks +
  # trackers; 132 findings — see new_suggestions/mining/). Brian approved the
  # full REVIEW_QUEUE: 15 new stamping + 9 new molding rules added (all
  # status: proposed, incl. the first flat-pattern/developed-blank set),
  # 10 evidence/capability updates to existing rules (incl. STMP-MIN-INSIDE-RADIUS
  # capability CONFIRMED at 0.08 per Polygon SD-accepted R0.025->R0.08), and a
  # proposed strip policy block. CTF import file: new_suggestions/mining/ctf-entries.json.
  # ---------------------------------------------------------------------------
  # status legend (added mine.1):
  #   active   = approved limit, enforced (all original seed rules are active)
  #   proposed = mined from a reference DFM, AWAITING Brian's sign-off (see
  #              REVIEW_QUEUE.md). Proposed rules and proposed_* fields must NOT
  #              be enforced until status is flipped to active by a human.
  # evidence[] / seen_count = provenance reinforcement added by the mining agent.
  # ---------------------------------------------------------------------------
  notes: >
    Ultra-thin precision leadframe stock (0.080 mm) means classic t-multiple
    feature minimums (1*t holes, 1.5*t edges) are NOT meaningful — minimums are
    set by SUPPLIER TOOLING CAPABILITY, so those rules are flagged
    supplier_adjustable and seeded as placeholders to confirm at FAI.
    seed.3 incorporates the AJET DFM review template (non-automotive,
    update 2025-09-18): stamping blanking/cutoff/forming limits and molding
    short-shot / shut-off / overflow / shrink / warp / over-mold-wall criteria.
    seed.4 incorporates the PHD Low Profile 5-8 pair DFM compilation
    (Amphenol TCS <-> AJET, 06-11-2026): stamping inside-corner radius and
    bend-transition placement; molding min rib/post/hole, internal corner
    radius, parting-line flash, sharp-corner venting and interference-clearance
    chamfers. Items that need a measured value or visual confirmation are
    seeded as manual-check criteria so they appear in every report with source.
    seed.5 de-duplicates near-identical rules (inside/form radius now share one
    parameter min_inside_corner_radius_mm; the pin-width blanking limit is folded
    into the min-pierced-width rule) and the inside-corner radius is now
    auto-measured from the model (min coaxial bend radius) instead of manual.
    mine.1 (cowork-dfm-agent, run 2026-06-19) is the FIRST automated mining pass
    over the reference_material/DFM_AI_Training corpus (75 PPTX + 1 PDF + 1 EML,
    plus the two template sources already in the seed). It REINFORCES existing
    rules with field-evidence, PROPOSES new stamping/molding rules, flags one
    blocker tightening (min moldable wall) and one minor loosening (molded
    internal radius) for review, and adds a NEW proposed process family,
    cnc_machining, for the p1255 backing-plate / endcap parts. Nothing here is
    active; every mine.1 item is status: proposed pending sign-off
    (see CHANGELOG_dfm.md and REVIEW_QUEUE.md).

# -----------------------------------------------------------------------------
process_families:

  # ===========================================================================
  stamping:
    applies_to_example: "P-233-1111-500 / 233-1111-020"
    material:
      family: copper_alloy
      thickness_mm: 0.080
      thickness_tol_mm: 0.005          # 0.080 +/-0.005, per MTS-515
      spec: MTS-515
      alloy_options:
        - {code: D, spec: "MTS-506/769 per EGS-205"}
        - {code: V, spec: "MTS-506/833 per EGS-205"}
      grain_direction_defined_required: true

    rules:
      - id: STMP-BURR-GEN
        parameter: burr_height
        operator: lte
        limit: 0.04
        severity: major
        source: "P-233-1111-500 Note 2"
        supplier_adjustable: false
        # mine.2 (REVIEW_QUEUE D): no limit change. Hoky states a 0.02mm max burr
        # at t=0.05 C5210-EH (tighter than this 0.04 cap) — recorded as supplier
        # capability, awaiting FAI (see new_suggestions/mining/ctf-entries.json).
        seen_count: 2
        evidence:
          - "mine.2 HOKY-012: 757-4311 A0 — 0.02mm max burr stated at t=0.05 C5210-EH (awaiting FAI)"
      - id: STMP-BURR-SPEC
        parameter: burr_height_specified_zone
        operator: lte
        limit: 0.02
        severity: major
        source: "P-233-1111-500 Note 3"
        supplier_adjustable: false
      - id: STMP-SHARP-CORNER
        parameter: undimensioned_radius_or_sharp_corner
        operator: lte
        limit: 0.10
        severity: minor
        source: "P-233-1111-500 Note 13"
        supplier_adjustable: false
      - id: STMP-MODEL-CONFORM
        parameter: undimensioned_feature_vs_model
        operator: lte
        limit: 0.05
        severity: major
        source: "P-233-1111-500 Note 20"
        supplier_adjustable: false
      - id: STMP-STOCK-THICKNESS-UNIFORM
        parameter: stock_thickness_uniformity_dev_mm
        operator: lte
        limit: 0.05                    # max wall deviation from the model-derived gauge
        severity: blocker
        source: "model-derived stock gauge (sheet stock is single-gauge; used when no 2D thickness spec)"
        supplier_adjustable: false
        marker: thickness              # 3D-viewer marker tag (decoupled from rule id)

      # --- AJET DFM review template (Concern & Proposal), update 2025-09-18 ----
      - id: STMP-CUTOFF-STRAIGHT-MIN
        parameter: tie_bar_cutoff_straight_mm
        operator: gte
        limit: 0.40                    # straight land needed to cut the tie-bar/strip
        severity: major
        source: "AJET DFM templet 2025-09-18 (Tie-bar & strip cutting): straight cut land >=0.40 mm"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
      - id: STMP-HOLE-TO-BEND
        parameter: hole_to_bend_clearance_mm
        operator: gte                  # r1: quantified from placeholder, Brian-approved 2026-06-19
        limit: 0.03                    # mm, min hole-to-bend clearance
        status: active
        severity: major
        source: "AJET DFM templet 2025-09-18 (Bending/stretch/coin); value from NextGen RAM field DFMs"
        supplier_adjustable: false
        seen_count: 3
        evidence:
          - "DFM NextGen RAM 2.0x2.0mm-X1 (2025-11-04) Sht12 / component-X1 (2025-11-04) Sht15: 'MIN. 0.03mm is required from the bend'"
          - "DFM for Next Gen RAM P0.2 concept-20260330 Sht8: 'Keep at least 0.03mm away from edge for bending'"
      - id: STMP-STANDOFF-PROTECT
        parameter: standoff_protection
        operator: eq
        limit: "confirm: add stand-off to protect beams / compliant pins while in the reel"
        severity: minor
        source: "AJET DFM templet 2025-09-18 (Stand-off confirm)"
        supplier_adjustable: false
      - id: STMP-VCUT-CONFIRM
        parameter: vcut_angle_and_depth
        operator: eq
        limit: "confirm: V-CUT angle & depth and edge-fold method (angle, number of passes)"
        severity: info
        source: "AJET DFM templet 2025-09-18 (V-CUT)"
        supplier_adjustable: false
      - id: STMP-OVERCUT-BURR
        parameter: overcut_join_burr_mm
        operator: lte                  # r1: quantified from placeholder, Brian-approved 2026-06-19
        limit: 0.03                    # mm, max residual after over-cut
        status: active
        severity: minor
        source: "AJET DFM templet 2025-09-18 (Over-cut location & burr); value from NextGen RAM field DFMs"
        supplier_adjustable: false
        seen_count: 2
        evidence:
          - "Concern for Next Gen RAM 2.0x2.0mm component-X1 (2025-11-04) Sht5: 'Max. 0.03mm residual after cutting'"
          - "DFM NextGen RAM 2.0x2.0mm-X1 (2025-11-04) Sht5: 'Max. 0.03mm residual after cutting'; Sht8 'add plastic 0.05mm to cover the burr of over-cut'"

      # --- PHD Low Profile 5-8 pair DFM compilation (TCS<->AJET 2026-06-11) -----
      - id: STMP-RIGHT-ANGLE-RADIUS
        parameter: min_inside_corner_radius_mm
        operator: gte
        limit: 0.2                     # sharp right angles crack when formed
        severity: major
        source: "PHD LP DFM compilation 2026-06-11 (stiffener): add R0.2 to right angles to avoid cracking"
        supplier_adjustable: false
        marker: radius                 # 3D-viewer marker tag (decoupled from rule id)
      - id: STMP-BEND-TRANSITION-FLAT
        parameter: bend_transition_location
        operator: eq
        limit: "confirm: keep the form/bend transition in the flat area (off features) to avoid cracking"
        severity: major
        source: "PHD LP DFM compilation 2026-06-11 (8*12 / 8*19 stiffener)"
        supplier_adjustable: false
      - id: STMP-STANDOFF-RIB
        parameter: standoff_rib_reinforcement
        operator: eq
        limit: "confirm: rib-reinforce stand-offs (deformation seen in mass production without it)"
        severity: minor
        source: "PHD LP DFM compilation 2026-06-11 (center / signal stand-off)"
        supplier_adjustable: false
      - id: STMP-MATE-RA
        parameter: mating_surface_roughness_Ra
        operator: lte
        limit: 16                      # micro-inch Ra
        units: uin
        severity: major
        source: "P-233-1111-500 Note 15"
        supplier_adjustable: false
      - id: STMP-CHAMFER-STD
        parameter: lead_in_chamfer
        operator: eq
        limit: "0.036 x 45deg, farside"
        severity: info
        source: "P-233-1111-500 Sht3 Details A/B/C/F"
        supplier_adjustable: false

      # --- geometric minimums: ultra-thin -> set by capability, confirm at FAI
      - id: STMP-MIN-PIERCE
        parameter: min_pierced_width_or_dia
        operator: gte
        limit: 0.15                    # PLACEHOLDER — confirm supplier capability
        severity: blocker
        source: "supplier capability (t=0.08 too thin for t-multiple rule); AJET DFM templet 2025-09-18 (Blanking) also calls min pin/land width >=0.15 mm"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
      - id: STMP-MIN-FEATURE-TO-EDGE
        parameter: feature_to_edge
        operator: gte
        limit: 0.12                    # PLACEHOLDER — confirm supplier capability
        severity: major
        source: "supplier capability"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
      - id: STMP-MIN-INSIDE-RADIUS
        parameter: min_inside_corner_radius_mm   # shared with STMP-RIGHT-ANGLE-RADIUS; auto-measured (min coaxial bend radius)
        operator: gte
        limit: 0.05                    # R0.05 typ appears on spring tabs; confirm
        severity: major
        source: "P-233-1111-500 Sht4 (R0.05) TYP — drawing min inside/form radius"
        supplier_adjustable: true
        marker: radius                 # 3D-viewer marker tag (decoupled from rule id)
        capability: {achieved_min: 0.08, cpk: null, confirmed: true}   # mine.2: Polygon R0.025->R0.08 SD-accepted 2026-05-29 (PGCD-004)
        # mine.1: field DFMs corroborate the ~R0.05 stamping floor (R0.025 not achievable)
        # mine.2 CONFLICT NOTE (Brian-approved): where function demands, a sharp
        # corner + overcut may override this rule with documented risk acceptance
        # (AJET-035 SD response: "it should be a sharp angle with an overcut").
        seen_count: 7
        evidence:
          - "DFM for Next Gen RAM P0.2 concept-20260330 Sht6: 'Blanking radii should be at least of R0.05mm'"
          - "PGCD DFM For 757-4111-03X (2026-05-23) Sht12/Sht14: 'product R0.025 cannot be met, optimize'; sharp corners recommended to R0.08 — confirms practical stamped inside-radius floor ~R0.05-0.08"
          - "mine.2 PGCD-004: 757-X111 sdcomments20260529 Sht12/14 — R0.025 not achievable at t=0.08, R0.08 accepted (OK --SD20260529): capability CONFIRMED"
          - "mine.2 AJET-014/AJET-035: blanking radii >=R0.05 (0330 Sht6); R0.03->R0.08 requested on SentryHD (0511 Sht11)"
          - "mine.2 HOKY-018/HOKY-021: 757-84X1 A0 Sht14 (R0.05->R0.08 for punch strength) / Sht17 (square-hole R too small, increase to R0.10)"

      # --- Phase 7: flat-pattern / developed-blank material checks ----------
      # Run on the *developed* (unfolded) blank. If the part cannot be unfolded
      # unambiguously (flat_pattern.status != "ok"), these return `manual` with
      # the unfold reasons — they are never silently passed.
      - id: STMP-FLAT-MIN-WEB
        parameter: flat_min_web_mm
        operator: gte
        limit: 0.12                    # PLACEHOLDER — supplier capability, confirm at FAI
        # mine.2: only field datum is 0.03 flagged "too small" (SD agreed to increase);
        # REVIEW_QUEUE approved a 0.05 floor alternative — true supplier floor is
        # between 0.03 and 0.12. Keeping the conservative 0.12 until confirmed.
        severity: major
        source: "flat-pattern development (min material web between adjacent cutouts in the developed blank)"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 3
        evidence:
          - "mine.2 PGCD-008: 757-3111 sdcomments20260707 Sht15 — 'gap when unfolding the product is too small at 0.03, recommended to increase' (OK, can increase. SD20260706)"
          - "mine.2 PGCD-006: 757-X111 sdcomments20260529 Sht13 — low-material region pulls/deforms irregularly during forming (risk accepted)"
          - "mine.2 HOKY-004: 757-4311 A0 Sht5 — material removal on bridge needed at stretch area to avoid deformation"
      - id: STMP-FLAT-FEATURE-TO-EDGE
        parameter: flat_min_feature_to_edge_mm
        operator: gte
        limit: 0.12                    # PLACEHOLDER — supplier capability, confirm at FAI
        severity: major
        source: "flat-pattern development (min cutout-to-blank-edge material in the developed blank)"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
      - id: STMP-FLAT-CARRIER-CONNECTION
        parameter: flat_min_carrier_connection_mm
        operator: gte
        limit: 0.40                    # PLACEHOLDER — supplier capability, confirm at FAI
        severity: major
        source: "flat-pattern development (blank-to-carrier tie width; manual unless carrier/strip context exists)"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
      - id: STMP-FLAT-OVERLAP
        parameter: flat_patch_overlap_mm
        operator: lte
        limit: 0.0                     # unfolded patches must not overlap — undevelopable if they do
        severity: blocker
        source: "flat-pattern development (patch overlap => the design cannot be developed to a flat blank)"
        supplier_adjustable: false

      # ======================================================================
      # mine.1 PROPOSED stamping rules (run 2026-06-19) — NOT active until signed off
      # ======================================================================
      - id: STMP-PLATING-STRIP-WIDTH-MAX
        parameter: plating_strip_width_max_mm
        operator: lte
        limit: 80.0                    # plating line max strip/part width
        severity: major
        status: active                 # r1: Brian-approved 2026-06-19
        source: "DFM for SentryHD RAM from AJET 2026-05-13 Sht7: 'width of pair 6 is over the 80mm maximum specified by the plating process ... can only be designed as a single strip'"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 3
        evidence:
          - "DFM SentryHD RAM 2026-05-13 Sht7: pair6 width 81.722mm > 80mm plating max"
          - "757-4311-03X_DFM_A0 2026-06-03 Sht2: t0.05mm strip width 72.0mm -> feeding extremely difficult, plating tension very high, strip-hole deformation risk"
          - "PGCD DFM 757-4111-03X 2026-05-23 Sht9: t0.08 width 70.4mm -> strip rigidity insufficient, feeding difficult, propose split (half) stamping"
      - id: STMP-CUT-TO-BEND-EDGE
        parameter: cut_edge_to_bend_edge_mm
        operator: gte
        limit: 0.12                    # straight land between a cut edge and the bend
        severity: major
        status: proposed
        source: "DFM for Next Gen RAM P0.2 concept-20260406 Sht1: 'The 0.12mm from cutting edge to bending edge is required'"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 1
        evidence:
          - "DFM for Next Gen RAM P0.2 concept-20260406 Sht1: 0.12mm cut-edge-to-bend-edge required (distinct from hole-to-bend 0.03mm, see STMP-HOLE-TO-BEND)"
      - id: STMP-2ND-PUNCH-CUTOFF-ANGLE
        parameter: second_punch_cutoff_angle_deg
        operator: gte
        limit: 45                      # too-small cut angle on 2nd punch -> burrs
        units: deg
        severity: minor
        status: proposed               # mine.2: stays ADVISORY (minor, never blocker) — SD rejected the change on 757-X111 and accepted burr risk
        source: "PGCD DFM For 757-4111-03X 2026-05-23 Sht21: 'angle at the cutting point of the second punch is too small, prone to burrs, change to 45 deg'"
        supplier_adjustable: false
        seen_count: 2
        evidence:
          - "mine.2 PGCD-012: 757-X111 sdcomments20260529 Sht24 — same 45deg request; 'No, we cannot change angle. We will accept some risk of burrs. --SD20260529'"

      # ======================================================================
      # mine.2 PROPOSED stamping rules (run 2026-07-13) — Diff Pair components
      # corpus (Hoky/AJET/Polygon). Brian approved inclusion as PROPOSED via
      # REVIEW_QUEUE.md 2026-07-13. Limits marked DERIVED were computed from
      # observed data, not stated verbatim — confirm before activating.
      # Evidence ids reference new_suggestions/mining/findings-*.jsonl.
      # ======================================================================
      - id: STMP-FLAT-BEND-LENGTH
        parameter: bend_flat_length_min_mm
        operator: gte
        limit: 0.30                    # flat available for a bend; below this metal fiber extrudes
        severity: major
        status: proposed
        source: "AJET NextGen P0.2 concept 260312 Sht5: 'flat is too small to bend, easy to extrude metal fiber, extend to 0.3mm'"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 1
        evidence: ["mine.2 AJET-004"]
      - id: STMP-FLAT-BEND-EDGE-LAND
        parameter: bend_to_blank_edge_land_mm
        operator: gte
        limit: 0.05                    # bend radius must not run off the blank edge; 0.03 absolute floor also cited
        severity: major
        status: proposed
        source: "AJET NextGen P0.2 concept 260312 Sht6 (leave 0.05mm land); concept-20260330 Sht8 (keep >=0.03mm from edge for bending)"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 2
        evidence: ["mine.2 AJET-005", "mine.2 AJET-016"]
      - id: STMP-STRIP-WIDTH-RIGIDITY
        parameter: strip_width_to_thickness_ratio
        operator: lte
        limit: 650                     # DERIVED: 53mm/0.08 (~660) flagged; accepted 29-48mm/0.08 (~360-600); 72mm/0.05 (1440) "extremely difficult"
        severity: major
        status: proposed
        source: "PGCD 757-X111 decks Sht9 (split stamping accepted --SD20260707); Hoky 757-4311 A0 Sht2"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 3
        evidence: ["mine.2 PGCD-001", "mine.2 PGCD-003", "mine.2 HOKY-001"]
      - id: STMP-TIEBAR-VESTIGE-TOL
        parameter: tie_bar_vestige_control
        operator: eq
        limit: "confirm: sheared tie-bar vestige position tolerance is +/-0.03mm and vestige is less precise than blanked features; v-notch must NOT be line-to-line with a blanking edge (SI impact)"
        severity: major
        status: proposed
        source: "AJET v-notch email thread 2026-04-18 (William Wang): vestige tolerance +/-0.03mm, cannot meet SI requirement"
        supplier_adjustable: false
        seen_count: 1
        evidence: ["mine.2 AJET-057"]
      - id: STMP-NO-VESTIGE-SIGNAL-TRACE
        parameter: tie_bar_vestige_placement
        operator: eq
        limit: "confirm: no tie-bar vestige along the length of any signal trace (sliver + SI risk governs bridge placement)"
        severity: major
        status: proposed
        source: "SD response, PGCD 757-3111 sdcomments20260707 Sht28-30: 'not acceptable, no tie-bar vestige along the signal trace'"
        supplier_adjustable: false
        seen_count: 1
        evidence: ["mine.2 PGCD-013"]
      - id: STMP-BRIDGE-CUT-BLADE
        parameter: bridge_cut_blade_min_thickness_mm
        operator: gte
        limit: 0.20                    # DERIVED floor: 0.17mm x 4-6mm blade flagged fragile for post-IM cutting
        severity: minor
        status: proposed
        source: "PGCD 757-3111 sdcomments20260707 Sht28: blade 0.17mm x 4-6mm prone to damage cutting bridges after IM"
        supplier_adjustable: true
        capability: {achieved_min: null, cpk: null, confirmed: false}
        seen_count: 1
        evidence: ["mine.2 PGCD-013"]
      - id: STMP-SEAM-GAP-IM-FLASH
        parameter: formed_seam_gap_mm
        operator: lte
        limit: 0.02                    # >0.02mm seam gap = plastic flash path during insert molding; curl seam requirement <0.03
        severity: major
        status: proposed
        source: "PGCD 757-8141 Rev.02 Sht13: 'terminal gap >0.02mm elevates flash risk' — SD: understood, stamping review if flash appears; curl gap <0.03 --SD20260529"
        supplier_adjustable: false
        seen_count: 3
        evidence: ["mine.2 PGCD-025", "mine.2 PGCD-007", "mine.2 PGCD-009"]
      - id: STMP-COIN-TOLERANCE-GUIDANCE
        parameter: coined_area_expectations
        operator: eq
        limit: "confirm: coined/extruded areas produce jagged, indistinct features and 0.02-0.03mm steps on adjacent bend planes; do not dimension tighter than this near coins; keep coin transition zones off bend radii; avoid large-area thinning"
        severity: minor
        status: proposed
        source: "Hoky 757-4311 A0 Sht4 (accepted --SD20260603) + 757-84X1 A0 Sht12; AJET P0.2 20260406 Sht2"
        supplier_adjustable: false
        seen_count: 4
        evidence: ["mine.2 HOKY-003", "mine.2 HOKY-016", "mine.2 AJET-018", "mine.2 PGCD-006"]
      - id: STMP-PLATE-MEASUREMENT-POINTS
        parameter: plating_thickness_measurement_points
        operator: eq
        limit: "confirm: plating thickness is controlled ONLY at defined 2D measurement points on primary coplanar faces; side/non-coplanar faces uncontrolled (visual coverage only) — controlling sides forces front thickness 2-3x over"
        severity: major
        status: proposed
        source: "Hoky 757-4311 A1 Sht10 (30u-in bend -> 45u-in flat) + 757-84X1 A0 Sht15; Polygon Signal-Vpair 833 plating DFM Sht3-4"
        supplier_adjustable: false
        seen_count: 4
        evidence: ["mine.2 HOKY-009", "mine.2 HOKY-019", "mine.2 PGCD-062", "mine.2 PGCD-063"]
      - id: STMP-PLATE-ZONE-DIMENSIONED
        parameter: selective_plating_zone_definition
        operator: eq
        limit: "confirm: all selective plating zones (Au/PdNi/Sn) explicitly dimensioned on 2D before DFM release — required for plating fixture design"
        severity: minor
        status: proposed

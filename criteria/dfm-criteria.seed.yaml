        source: "DFM for Next Gen RAM 2.0x2.0mm component-X1 2025-10-14 Sht7: 'Straight sealing length need 1.0mm MIN; injection insert length need 0.5mm; avoiding gap need 0.5mm'"
        supplier_adjustable: false

          - "DFM2550324 CBF&CBM Housing 2025-07-10 Sht23: 'Gate Residual Max 0.10mm' (sub gate, cut 0.1mm countertop)"
          - "DFM2650336 SENTRY HD Housing 2026-06-01 Sht15-18: sub gate Ø0.6, 1.5x0.2DP gate-void"
          - "16X16-HSG-CONCEPT2 2025-12-08 Sht8: 'residual gate material of 0.2(Max)' (worst-case 0.2 when un-cored)"
          - "C15-HSG-CONCEPT1 Sht8: 'residual gate material 0.1(Max)'"
      - id: MOLD-RELEASE-DRAFT-MIN
        parameter: recommended_release_draft_deg
        operator: gte
        limit: 2.0                     # min draft to add for clean release (range 1.5-4 deg seen)
        units: deg
        severity: minor
        status: active                 # r1: Brian-approved 2026-06-19
        source: "DFM for SentryHD RAM-20260511 Sht9: 'add a 2 deg draft by reducing plastic around posts to prevent sticking'"
        supplier_adjustable: true
        seen_count: 5
        evidence:
          - "NextGen RAM 16x16 top&bottom shell 2025-12-04 Sht7: 'add draft 3 deg by reducing plastic'"
          - "NextGen RAM 2x2 organizer-X2 2025-12-01 Sht5/6: 'Draft 4 deg by reducing plastic on all similar features'"
          - "SentryHD RAM 2026-05-11 Sht9 & HAORUN 2025-12-01 Sht25: '2 deg draft around posts'"
          - "RAM 4x4 &16x16 &16x15 ORG 2025-12-08 Sht10: 'add plastic 1.5 deg draft'"
          - "NOTE: distinct from MOLD-DRAFT-POST (<=1.0 deg dimensional cap); this is the MIN release draft to add"
      - id: MOLD-WELDLINE-ANGLE-MIN
        parameter: weld_line_convergence_angle_deg
        operator: gte
        limit: 135                     # below 135 deg weld lines become visible -> vent
        units: deg
        severity: minor
        status: proposed
        source: "DFM For 16X16-HSG-CONCEPT2-20251208 Sht27 (moldflow): 'Welding lines with a convergence angle less than 135 deg are visible. Advise add air vent on weld lines.'"
        supplier_adjustable: false
        seen_count: 1
      - id: MOLD-SHEAR-RATE-MAX
        parameter: max_shear_rate_1_per_s
        operator: lte
        limit: 60000                   # LCP Kingfa Vicryst R8332 processing ceiling
        units: "1/s"
        severity: major
        status: active                 # r1: Brian-approved 2026-06-19
